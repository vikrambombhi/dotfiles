set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v0.3.0'

set -g @catppuccin_custom_plugin_dir "~/dev/dotfiles/tmux/catppuccin-custom-plugin/"
set -g @catppuccin_status_modules_right "date_time git_branch git_pr"
set -g @catppuccin_date_time_icon "🗓️ "
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_current_fill "all"


# Enable mouse support
set -g mouse on

# Click the PR pill in the status bar to open the current branch's PR.
# A range=user click fires MouseDown1Status (not StatusRight), so bind that and
# match the named range (#[range=user|pr]) emitted by the git_pr module; fall
# back to the default window-select for clicks elsewhere on the status line.
bind-key -n MouseDown1Status if -F "#{==:#{mouse_status_range},pr}" {
  run-shell -b "cd '#{pane_current_path}' && ~/dev/dotfiles/tmux/catppuccin-custom-plugin/git_pr_status.sh --open"
} {
  select-window -t=
}

# move status to bottom
set-option -g status-position top

# Colors
set-option -g default-terminal "screen-256color"
set -ga terminal-overrides ',xterm-256color:Tc'

set-option -sg escape-time 10
# Increase history buffer
set-option -g history-limit 100000

# set ctrl+a as prefix
set -g prefix C-a

# split current window horizontally
bind _ split-window -v
# split current window vertically
bind | split-window -h

# Use vim like keys
setw -g mode-keys vi

# pane navigation
bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R # move right

# Resize windows
bind-key J resize-pane -D 20
bind-key K resize-pane -U 20
bind-key H resize-pane -L 20
bind-key L resize-pane -R 20


# Sort choose-tree alphabetically
# set-option -g @choose-tree-sort "alphabetically"

# Sort choose-tree alphabetically and show sessions collapsed
# bind s choose-tree -s -O name
# Automatically attach to named sessions if they already exists
# set -g new -A

# Initialize TMUX plugin manager
# How to install tmp
# $ git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.config/tmux/plugins/tpm/tpm'
